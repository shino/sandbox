name: DB Guard Fail Test (simulated redhat diff-db failure)

# Sibling of db-guard-fail-test-ubuntu-detection.yml. This one pins two
# historical DB digests from ghcr.io/vulsio/vuls-nightly-db that exhibit
# a huge one-day redhat regression between 2026-03-03 and 2026-03-04:
# redhat:6 Detection Change Rate 65.1%, redhat:7 56.5%, redhat:5 8.7%,
# redhat:4 2.5%. KB change rate is 0.0% for all ecosystems (pure
# detection-side churn in the extracted data).
#
# `skip-diff-detection: true` is passed to the composite so only
# `vuls diff db` runs — that is the failure path this scenario exercises.
#
# The baseline/target digests are hardcoded as env vars (BASELINE_REPOSITORY /
# TARGET_REPOSITORY) below.

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
    inputs:
      db_change_rate_threshold:
        description: "`vuls diff db` change rate (%) threshold per ecosystem; diff fails if exceeded. Default 10 — redhat:6/7 change rates are ~65%/57% so any reasonable threshold will trip."
        required: false
        default: "10"
      detection_change_rate_threshold:
        description: "`vuls diff detection` change rate (%) threshold per scan result; diff fails if exceeded"
        required: false
        default: "5"
      force:
        description: "**DANGER** Skip diff checks and proceed regardless"
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  build:
    name: build vuls.db
    permissions:
      contents: read
      # packages:write required for pushing to GHCR and moving the :nightly tag.
      packages: write
    runs-on: ubuntu-latest
    env:
      GOEXPERIMENT: jsonv2
      # Sandbox publish target. Production will point at ghcr.io/vulsio/vuls-nightly-db.
      PUBLISH_REPO: ghcr.io/shino/package-push-test1
      PROMOTE_TAG: nightly
      # Historical vuls.db digests pinned to simulate a redhat regression.
      # Obtained via `vuls db search metadata --dbpath <daily>.db | jq -r .digest`.
      # Baseline: 2026-03-03 nightly-db. Target: 2026-03-04 nightly-db
      # (redhat:6 Detection Change Rate 65.1%, redhat:7 56.5%, redhat:5 8.7%,
      # redhat:4 2.5%; KB change rate 0.0% — pure detection-side churn).
      BASELINE_REPOSITORY: ghcr.io/vulsio/vuls-nightly-db@sha256:692d444eab1b00df28e82b2c9bd79ead31761586d0f6dabc71aab591a848dbd5
      TARGET_REPOSITORY: ghcr.io/vulsio/vuls-nightly-db@sha256:1b87a7a198d9c765a35df803b2d5b61d1c5e2aad4e7c23b2427a44b25f69e0f2
    steps:
      # Check out this repo first so the composite action at
      # `.github/actions/diff-guard` is resolvable via `uses: ./...`.
      # NOTE: must precede any step that writes files to the workspace —
      # `actions/checkout` cleans the workspace by default and would wipe
      # the freshly fetched ./vuls.db otherwise.
      - name: Check out repository (for composite action)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Go 1.x
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: "stable"
          cache: false

      - name: Install vuls2
        # Pinned to the commit that introduced tagless `vuls db push`
        # (feat(db/push): support untagged push). Bump to @nightly once
        # released.
        run: go install github.com/MaineK00n/vuls2/cmd/vuls@5d67300d80e0b831ed559e2c875959b3010ea026

      # vuls-data-update is used to move the :nightly tag (registry tag)
      # once the guard passes.
      - name: Install vuls-data-update
        run: go install github.com/MaineK00n/vuls-data-update/cmd/vuls-data-update@main

      # Stand-in for the freshly built ./vuls.db — fetch the hand-picked target
      # DB (expected to contain the simulated redhat regression).
      - name: Fetch target vuls.db (hand-picked historical DB)
        run: vuls db fetch --dbpath ./vuls.db --repository "$TARGET_REPOSITORY" --no-progress

      # `vuls db push` only accepts Zstandard-compressed payloads.
      - name: Compress vuls.db (zstd)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq zstd
          zstd -f -T0 ./vuls.db -o ./vuls.db.zst
          ls -lh ./vuls.db ./vuls.db.zst

      # Design: "always push tagless, operate by digest, promote to :nightly only on pass".
      # See db-guard-test.yml for the rationale. In this fail-test workflow
      # the guard is EXPECTED to fail, so the promotion step below is
      # expected to be skipped — leaving :nightly untouched while the
      # candidate manifest remains pullable by digest for investigation.
      - name: Push vuls.db to GHCR (tagless, digest-only)
        id: push
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          log=$(mktemp)
          vuls db push --token "${GH_TOKEN}" "${PUBLISH_REPO}" ./vuls.db.zst \
            > >(tee /dev/stderr) \
            2> >(tee "${log}" >&2)
          digest=$(grep -oE 'digest=sha256:[0-9a-f]+' "${log}" | tail -n1 | cut -d= -f2)
          if [ -z "${digest}" ]; then
            echo "failed to capture digest from vuls db push log" >&2
            exit 1
          fi
          echo "digest=${digest}" >> "$GITHUB_OUTPUT"
          {
            echo "## Pushed candidate image (untagged, digest-only)"
            echo '```text'
            echo "digest ref : ${PUBLISH_REPO}@${digest}"
            echo '```'
            echo "Image is always pushed before the diff guard runs; a failing"
            echo "build stays pullable by digest for investigation."
          } >> "$GITHUB_STEP_SUMMARY"

      # Expected to FAIL at the final `vuls diff db` step: baseline/target
      # differ by ~65% on redhat:6 / ~57% on redhat:7. Detection is skipped
      # via the composite flag below.
      - name: Run diff guard
        if: ${{ github.event.inputs.force != 'true' }}
        uses: ./.github/actions/diff-guard
        with:
          target-db: ./vuls.db
          baseline-repository: ${{ env.BASELINE_REPOSITORY }}
          db-change-rate-threshold: ${{ github.event.inputs.db_change_rate_threshold || '10' }}
          detection-change-rate-threshold: ${{ github.event.inputs.detection_change_rate_threshold || '5' }}
          vuls0-old-ref: 9efad2a
          # The pinned BASELINE/TARGET DBs (2026-03-03/04) predate several
          # OS families present in the fixture set and `vuls diff detection`
          # crashes on them. This scenario only exercises the `vuls diff db`
          # failure path anyway, so skip detection entirely.
          skip-diff-detection: "true"

      # Guard passed (or was skipped via force=true): attach :nightly to the
      # verified digest. In this fail-test the guard is expected to fail, so
      # this step will normally be skipped and :nightly will remain untouched.
      - name: Promote digest to :nightly
        env:
          DIGEST: ${{ steps.push.outputs.digest }}
        run: |
          set -euo pipefail
          vuls-data-update dotgit registry tag \
            --token "${{ secrets.GITHUB_TOKEN }}" \
            "${PUBLISH_REPO}@${DIGEST}" "${PROMOTE_TAG}"
          {
            echo "## Promoted to :${PROMOTE_TAG}"
            echo '```text'
            echo "ref        : ${PUBLISH_REPO}:${PROMOTE_TAG}"
            echo "digest ref : ${PUBLISH_REPO}@${DIGEST}"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
