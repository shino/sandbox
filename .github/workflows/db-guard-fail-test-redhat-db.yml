name: DB Guard Fail Test (simulated redhat diff-db failure)

# Sibling of db-guard-fail-test-ubuntu-detection.yml. This one pins two
# historical DB digests from ghcr.io/vulsio/vuls-nightly-db that exhibit
# a huge one-day redhat regression between 2026-03-03 and 2026-03-04:
# redhat:6 Detection Change Rate 65.1%, redhat:7 56.5%, redhat:5 8.7%,
# redhat:4 2.5%. KB change rate is 0.0% for all ecosystems (pure
# detection-side churn in the extracted data).
#
# The `vuls diff detection` checks (master + older-binary) are commented out
# below — detection output moves in tandem with this change and would mask
# the `vuls diff db` failure we want to exercise.
#
# The baseline/target digests are hardcoded as env vars (BASELINE_REPOSITORY /
# TARGET_REPOSITORY) below.

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
    inputs:
      db_change_rate_threshold:
        description: "`vuls diff db` change rate (%) threshold per ecosystem; diff fails if exceeded. Default 10 — redhat:6/7 change rates are ~65%/57% so any reasonable threshold will trip."
        required: false
        default: "10"
      detection_change_rate_threshold:
        description: "`vuls diff detection` change rate (%) threshold per scan result; diff fails if exceeded (detection steps are commented out below)"
        required: false
        default: "5"
      force:
        description: "**DANGER** Skip diff checks and proceed regardless"
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  build:
    name: build vuls.db
    permissions:
      contents: read
      packages: read
    runs-on: ubuntu-latest
    env:
      GOEXPERIMENT: jsonv2
      FORCE: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.force == 'true' || 'false' }}
      DB_CHANGE_RATE_THRESHOLD: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.db_change_rate_threshold || '10' }}
      DETECTION_CHANGE_RATE_THRESHOLD: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.detection_change_rate_threshold || '5' }}
      # Historical vuls.db digests pinned to simulate a redhat regression.
      # Obtained via `vuls db search metadata --dbpath <daily>.db | jq -r .digest`.
      # Baseline: 2026-03-03 nightly-db. Target: 2026-03-04 nightly-db
      # (redhat:6 Detection Change Rate 65.1%, redhat:7 56.5%, redhat:5 8.7%,
      # redhat:4 2.5%; KB change rate 0.0% — pure detection-side churn).
      BASELINE_REPOSITORY: ghcr.io/vulsio/vuls-nightly-db@sha256:692d444eab1b00df28e82b2c9bd79ead31761586d0f6dabc71aab591a848dbd5
      TARGET_REPOSITORY: ghcr.io/vulsio/vuls-nightly-db@sha256:1b87a7a198d9c765a35df803b2d5b61d1c5e2aad4e7c23b2427a44b25f69e0f2
    steps:
      - name: Set up Go 1.x
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: "stable"
          cache: false

      - name: Install vuls2
        run: go install github.com/MaineK00n/vuls2/cmd/vuls@nightly

      # Stand-in for the freshly built ./vuls.db — fetch the hand-picked target
      # DB (expected to contain the simulated redhat regression).
      - name: Fetch target vuls.db (hand-picked historical DB)
        run: vuls db fetch --dbpath ./vuls.db --repository "$TARGET_REPOSITORY" --no-progress

      # --- BEGIN: logic to paste between "Compact vuls.db" and "Upload vuls.db..." in db-nightly.yml ---

      # Sanity-check strategy:
      # - Run `vuls diff detection` and `vuls diff db` between baseline and target.
      #   If either check fails the freshly built DB MUST NOT be published.
      # - Start with detection against vuls0 master HEAD: a large detection
      #   gap almost always means the DB should not ship.
      # - Then re-run detection with a slightly older pinned vuls0 binary to
      #   catch regressions that only show up against past vuls0 versions.
      # - Run `vuls diff db` last. Structural changes to the extracted data can
      #   legitimately inflate the raw DB diff even when detection is stable;
      #   if detection shows near-zero change but only `diff db` fails, and the
      #   cause is well understood, re-run this workflow with `force=true` to
      #   proceed with the publish.

      - name: Fetch baseline vuls.db (hand-picked historical DB)
