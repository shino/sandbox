name: DB Guard Fail Test (simulated ubuntu regression)

# Sibling of db-guard-test.yml. Instead of fetching the current nightly DB for
# both baseline and target, this workflow pins two historical DB digests from
# ghcr.io/vulsio/vuls-nightly-db that are known to contain a massive ubuntu-wide
# churn (all ubuntu releases FAIL, peak ~745% on ubuntu:25.10) between
# 2026-03-10 and 2026-03-11. Combined with a pinned older vuls0 binary
# (9efad2a), both the master and older-binary detection checks are expected to
# FAIL, simulating an ubuntu regression landing in the nightly DB.
#
# The baseline/target digests are hardcoded as env vars (BASELINE_REPOSITORY /
# TARGET_REPOSITORY) below.

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
    inputs:
      db_change_rate_threshold:
        description: "`vuls diff db` change rate (%) threshold per ecosystem; diff fails if exceeded"
        required: false
        default: "10"
      detection_change_rate_threshold:
        description: "`vuls diff detection` change rate (%) threshold per scan result; diff fails if exceeded"
        required: false
        default: "5"
      force:
        description: "**DANGER** Skip diff checks and proceed regardless"
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  build:
    name: build vuls.db
    permissions:
      contents: read
      # packages:write required for pushing to GHCR and moving the :nightly tag.
      packages: write
    runs-on: ubuntu-latest
    env:
      GOEXPERIMENT: jsonv2
      # Historical vuls.db digests pinned to simulate a broken target DB.
      # Obtained via `vuls db search metadata --dbpath <daily>.db | jq -r .digest`.
      # Baseline: 2026-03-10 nightly-db. Target: 2026-03-11 nightly-db (contains
      # the massive ubuntu-wide churn; peak ~745% on ubuntu:25.10).
      BASELINE_REPOSITORY: ghcr.io/vulsio/vuls-nightly-db@sha256:eab4b15e4db3700fa233bd5bc1e4dec87f3c0a71ad840f077897d527e4623f39
      TARGET_REPOSITORY: ghcr.io/vulsio/vuls-nightly-db@sha256:432808a4dfbea5d7b5be411f60d4af9d23c68a414235349eecfa92009d3d5f1a
    steps:
      - name: Maximize build space
        uses: AdityaGarg8/remove-unwanted-software@90e01b21170618765a73370fcc3abbd1684a7793 # v5
        with:
          remove-dotnet: "true"
          remove-android: "true"
          remove-haskell: "true"
          remove-codeql: "true"
          remove-docker-images: "true"
          remove-large-packages: "true"
          remove-cached-tools: "true"
          remove-swapfile: "true"

      # Check out this repo first so the composite action at
      # `.github/actions/diff-guard` is resolvable via `uses: ./...`.
      # NOTE: must precede any step that writes files to the workspace —
      # `actions/checkout` cleans the workspace by default and would wipe
      # the freshly fetched ./vuls.db otherwise.
      - name: Check out repository (for composite action)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Go 1.x
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: "stable"
          cache: false

      - name: Install vuls2
        run: go install github.com/MaineK00n/vuls2/cmd/vuls@nightly

      # vuls-data-update is used to move the :nightly tag (registry tag)
      # once the guard passes.
      - name: Install vuls-data-update
        run: go install github.com/MaineK00n/vuls-data-update/cmd/vuls-data-update@main

      # Stand-in for the freshly built ./vuls.db — fetch the hand-picked target
      # DB (expected to contain the simulated ubuntu regression).
      - name: Fetch target vuls.db (hand-picked historical DB)
        run: vuls db fetch --dbpath ./vuls.db --repository "$TARGET_REPOSITORY" --no-progress

      # `vuls db push` only accepts Zstandard-compressed payloads.
      - name: Compress vuls.db (zstd)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq zstd
          zstd -f -T0 ./vuls.db -o ./vuls.db.zst
          ls -lh ./vuls.db ./vuls.db.zst

      # Design: "always push tagless, operate by digest, promote to :nightly only on pass".
      # See db-guard-test.yml for the rationale. In this fail-test workflow
      # the guard is EXPECTED to fail, so the promotion step below is
      # expected to be skipped — leaving :nightly untouched while the
      # candidate manifest remains pullable by digest for investigation.
      - name: Push vuls.db to GHCR (tagless, digest-only)
        id: push
        run: |
          set -euo pipefail
          digest=$(vuls db push --token "${{ secrets.GITHUB_TOKEN }}" ghcr.io/shino/package-push-test1 ./vuls.db.zst)
          echo "digest=${digest}" >> "$GITHUB_OUTPUT"
          {
            echo "## Pushed candidate image (untagged, digest-only)"
            echo '```text'
            echo "digest ref : ghcr.io/shino/package-push-test1@${digest}"
            echo '```'
            echo "Image is always pushed before the diff guard runs; a failing"
            echo "build stays pullable by digest for investigation."
          } >> "$GITHUB_STEP_SUMMARY"

      # Expected to FAIL at the detection steps: the target DB contains a
      # massive ubuntu-wide churn vs the baseline (peak ~745% on ubuntu:25.10),
      # which trips detection_change_rate_threshold on both the master and the
      # pinned older (9efad2a) vuls0 binaries.
      - name: Run diff guard
        if: ${{ github.event.inputs.force != 'true' }}
        uses: ./.github/actions/diff-guard
        with:
          target_db: ./vuls.db
          baseline_repository: ${{ env.BASELINE_REPOSITORY }}
          db_change_rate_threshold: ${{ github.event.inputs.db_change_rate_threshold || '10' }}
          detection_change_rate_threshold: ${{ github.event.inputs.detection_change_rate_threshold || '5' }}
          vuls0_old_ref: 9efad2a

      # Guard passed (or was skipped via force=true): attach :nightly to the
      # verified digest. In this fail-test the guard is expected to fail, so
      # this step will normally be skipped and :nightly will remain untouched.
      - name: Promote digest to :nightly
        env:
          DIGEST: ${{ steps.push.outputs.digest }}
        run: |
          set -euo pipefail
          vuls-data-update dotgit registry tag \
            --token "${{ secrets.GITHUB_TOKEN }}" \
            "ghcr.io/shino/package-push-test1@${DIGEST}" nightly
          {
            echo "## Promoted to :nightly"
            echo '```text'
            echo "ref        : ghcr.io/shino/package-push-test1:nightly"
            echo "digest ref : ghcr.io/shino/package-push-test1@${DIGEST}"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
