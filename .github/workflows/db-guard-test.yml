name: DB Guard Test

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
    inputs:
      db_change_rate_threshold:
        description: "`vuls diff db` change rate (%) threshold per ecosystem; diff fails if exceeded"
        required: false
        default: "10"
      detection_change_rate_threshold:
        description: "`vuls diff detection` change rate (%) threshold per scan result; diff fails if exceeded"
        required: false
        default: "5"
      force:
        description: "**DANGER** Skip diff checks and proceed regardless"
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  build:
    name: build vuls.db
    permissions:
      contents: read
      packages: read
    runs-on: ubuntu-latest
    env:
      GOEXPERIMENT: jsonv2
    steps:
      # Check out this repo first so the composite action at
      # `.github/actions/diff-guard` is resolvable via `uses: ./...`.
      # NOTE: must precede any step that writes files to the workspace —
      # `actions/checkout` cleans the workspace by default and would wipe
      # the freshly fetched ./vuls.db otherwise.
      - name: Check out repository (for composite action)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Go 1.x
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: "stable"
          cache: false

      - name: Install vuls2
        run: go install github.com/MaineK00n/vuls2/cmd/vuls@nightly

      # Skip the real db-build (fetch/extract/add) for this smoke test; pull an
      # existing nightly DB so `vuls diff detection` has something to read.
      # In production this is replaced with the freshly built ./vuls.db.
      - name: Fetch target vuls.db (stand-in for db-build output)
        run: vuls db fetch --dbpath ./vuls.db --repository ghcr.io/vulsio/vuls-nightly-db:nightly --no-progress

      - name: Run diff guard
        if: ${{ github.event.inputs.force != 'true' }}
        uses: ./.github/actions/diff-guard
        with:
          target-db: ./vuls.db
          baseline-repository: ghcr.io/vulsio/vuls-nightly-db:nightly
          db-change-rate-threshold: ${{ github.event.inputs.db_change_rate_threshold || '10' }}
          detection-change-rate-threshold: ${{ github.event.inputs.detection_change_rate_threshold || '5' }}

      - name: Upload vuls.db to ghcr.io/vulsio/vuls-nightly-db (dummy for test)
        run: echo "dummy publish"
