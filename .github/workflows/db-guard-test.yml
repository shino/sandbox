name: DB Guard Test

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
    inputs:
      db_change_rate_threshold:
        description: "`vuls diff db` change rate (%) threshold per ecosystem; diff fails if exceeded"
        required: false
        default: "10"
      detection_change_rate_threshold:
        description: "`vuls diff detection` change rate (%) threshold per scan result; diff fails if exceeded"
        required: false
        default: "5"

permissions:
  contents: read

jobs:
  build:
    name: build vuls.db
    permissions:
      contents: read
      # packages:write required for pushing to GHCR and moving the :nightly tag.
      packages: write
    runs-on: ubuntu-latest
    env:
      GOEXPERIMENT: jsonv2
    steps:
      - name: Maximize build space
        uses: AdityaGarg8/remove-unwanted-software@90e01b21170618765a73370fcc3abbd1684a7793 # v5
        with:
          remove-dotnet: "true"
          remove-android: "true"
          remove-haskell: "true"
          remove-codeql: "true"
          remove-docker-images: "true"
          remove-large-packages: "true"
          remove-cached-tools: "true"
          remove-swapfile: "true"

      # Check out this repo first so the composite action at
      # `.github/actions/diff-guard` is resolvable via `uses: ./...`.
      # NOTE: must precede any step that writes files to the workspace —
      # `actions/checkout` cleans the workspace by default and would wipe
      # the freshly fetched ./vuls.db otherwise.
      - name: Check out repository (for composite action)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Go 1.x
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: "stable"
          cache: false

      - name: Install vuls2
        run: go install github.com/MaineK00n/vuls2/cmd/vuls@nightly

      # vuls-data-update is used to move the :nightly tag (registry tag)
      # once the guard passes.
      - name: Install vuls-data-update
        run: go install github.com/MaineK00n/vuls-data-update/cmd/vuls-data-update@nightly

      # Skip the real db-build (fetch/extract/add) for this smoke test; pull an
      # existing nightly DB so `vuls diff detection` has something to read.
      # In production this is replaced with the freshly built ./vuls.db.
      - name: Fetch target vuls.db (stand-in for db-build output)
        run: vuls db fetch --dbpath ./vuls.db --repository ghcr.io/vulsio/vuls-nightly-db:nightly --no-progress

      # `vuls db push` only accepts Zstandard-compressed payloads.
      - name: Compress vuls.db (zstd)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq zstd
          zstd -f -T0 ./vuls.db -o ./vuls.db.zst
          ls -lh ./vuls.db ./vuls.db.zst

      # Design: "always push tagless, operate by digest, promote to :nightly only on pass".
      #
      # `vuls db push` accepts a tagless `<repository>` reference: the
      # manifest is pushed without any tag and only reachable by digest.
      # The resulting digest is written to stdout as a single
      # `sha256:...` line, so we can capture it with command
      # substitution.
      #
      # All subsequent operations reference `ghcr.io/shino/package-push-test1@<digest>`.
      # Even if the guard fails the untagged manifest remains pullable by
      # digest for investigation (within GHCR's retention window).
      - name: Push vuls.db to GHCR (tagless, digest-only)
        id: push
        run: |
          set -euo pipefail
          digest=$(vuls db push --token "${{ secrets.GITHUB_TOKEN }}" ghcr.io/shino/package-push-test1 ./vuls.db.zst)
          echo "digest=${digest}" >> "$GITHUB_OUTPUT"
          {
            echo "## Pushed candidate image (untagged, digest-only)"
            echo '```text'
            echo "digest ref : ghcr.io/shino/package-push-test1@${digest}"
            echo '```'
            echo "Image is always pushed before the diff guard runs; a failing"
            echo "build stays pullable by digest for investigation."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Run diff guard
        uses: ./.github/actions/diff-guard
        with:
          target_db: ./vuls.db
          baseline_repository: ghcr.io/vulsio/vuls-nightly-db:nightly
          db_change_rate_threshold: ${{ github.event.inputs.db_change_rate_threshold || '10' }}
          detection_change_rate_threshold: ${{ github.event.inputs.detection_change_rate_threshold || '5' }}

      # Guard passed: attach :nightly to the verified digest. The
      # previously-tagged :nightly manifest becomes
      # untagged and remains reachable by digest within GHCR's retention window.
      - name: Promote digest to :nightly
        env:
          DIGEST: ${{ steps.push.outputs.digest }}
        run: |
          set -euo pipefail
          vuls-data-update dotgit registry tag \
            --token "${{ secrets.GITHUB_TOKEN }}" \
            "ghcr.io/shino/package-push-test1@${DIGEST}" nightly
          {
            echo "## Promoted to :nightly"
            echo '```text'
            echo "ref        : ghcr.io/shino/package-push-test1:nightly"
            echo "digest ref : ghcr.io/shino/package-push-test1@${DIGEST}"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
